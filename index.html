        const COLORS = [
          'text-pink-400', 
          'text-cyan-400', 
          'text-yellow-300', 
          'text-green-400', 
          'text-orange-400'
        ];

        const SAFE_POSITIONS = [
          { x: 0, y: -28 },    
          { x: 23, y: -12 },   
          { x: 23, y: 15 },    
          { x: 0, y: 30 },     
          { x: -23, y: 15 },   
          { x: -23, y: -12 }   
        ];

        function shuffleArray(array) {
          const newArr = [...array];
          for (let i = newArr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
          }
          return newArr;
        }

        function generateCardItems(targetRootIndex, gameData) {
          if (!gameData || gameData.length === 0) return [];
          
          let availableRoots = gameData.map((_, i) => i).filter(i => i !== targetRootIndex);
          let numDistractions = Math.min(5, availableRoots.length);
          availableRoots = shuffleArray(availableRoots).slice(0, numDistractions);
          
          const selectedRoots = [targetRootIndex, ...availableRoots];
          const shuffledPositions = shuffleArray(SAFE_POSITIONS);

          return selectedRoots.map((rootIndex, i) => {
            const words = gameData[rootIndex].words;
            const word = words && words.length > 0 
              ? words[Math.floor(Math.random() * words.length)] 
              : gameData[rootIndex].root;
              
            const pos = shuffledPositions[i];
            const rotation = Math.random() * 20 - 10; 
            const color = COLORS[Math.floor(Math.random() * COLORS.length)];

            return {
              id: `word-${Date.now()}-${i}`,
              rootIndex,
              text: word,
              x: pos.x,
              y: pos.y,
              rotation,
              color
            };
          });
        }

        const WordCardRenderer = ({ items, role, onClick, withNiqqud }) => {
          if (!items || items.length === 0) return null;

          const isPlayer = role === 'player';
          let borderColor = isPlayer 
            ? 'border-green-400 shadow-[0_0_30px_rgba(74,222,128,0.6)]' 
            : 'border-red-500 shadow-[0_0_30px_rgba(239,68,68,0.6)]';

          return (

              <div className="absolute inset-0 opacity-20" style={{ backgroundImage: 'radial-gradient(circle, #fff 10%, transparent 10.01%)', backgroundSize: '15px 15px' }}></div>

                  const isImage = displayText.startsWith('http');
                  
                  return (
                    <div
                      key={item.id}
                      onClick={() => isPlayer ? onClick(item) : null}
                      className={`absolute font-bold whitespace-nowrap transition-all duration-200 
                        ${isPlayer ? 'cursor-pointer hover:scale-125 hover:z-10' : 'cursor-default'} 
                        ${!isImage ? item.color : ''}`}
                      style={{
                        left: `calc(50% + ${item.x}%)`,
                        top: `calc(50% + ${item.y}%)`,
                        transform: `translate(-50%, -50%) rotate(${item.rotation}deg)`,
                        fontSize: 'clamp(0.9rem, 2vw, 1.5rem)',
                        fontFamily: '"Apple Color Emoji", "Segoe UI Emoji", "Assistant", sans-serif'
                      }}

                      {isImage ? (

                      ) : (

                      )}
                    </div>
                  );

              </div>
            </div>
          );

          const displayRootName = withNiqqud ? rootName : strippedRootName;

                  whiteSpace: isShort ? 'nowrap' : 'normal',

              </div>
            </div>
          );
        };

        function App() {
          const [gameState, setGameState] = useState('splash');
          const [difficulty, setDifficulty] = useState('easy'); 
          const [withNiqqud, setWithNiqqud] = useState(true);
          
          // הכותרת המרכזית שונתה למשחק מהירות
          const [gameTitle, setGameTitle] = useState("משחק מהירות");
          const [gameData, setGameData] = useState(GAME_TEMPLATES.roots.data);
          
          const [editTitle, setEditTitle] = useState(GAME_TEMPLATES.roots.title);
          const [editData, setEditData] = useState([]);
          
          const [playerCardsLeft, setPlayerCardsLeft] = useState(15);
          const [computerCardsLeft, setComputerCardsLeft] = useState(15);
          
          const [centerRootIndex, setCenterRootIndex] = useState(null);
          const [playerItems, setPlayerItems] = useState([]);
          const [computerItems, setComputerItems] = useState([]);
          
          const [round, setRound] = useState(0);
          const [feedback, setFeedback] = useState(null); 
          const [winner, setWinner] = useState(null);
          const [alertMsg, setAlertMsg] = useState(null);

          useEffect(() => {
            if (gameState === 'splash') {
              const timer = setTimeout(() => {
                setGameState('menu');
              }, 2500);
              return () => clearTimeout(timer);
            }
          }, [gameState]);

          const openEditor = () => {
            setEditTitle(gameTitle);
            const editableData = gameData.map(item => ({
              root: item.root,
              wordsString: item.words ? item.words.join(', ') : ''
            }));
            setEditData(editableData);
            setGameState('editor');
          };

          const loadTemplate = (templateKey) => {
            const template = GAME_TEMPLATES[templateKey];
            setEditTitle(template.title);
            const editableData = template.data.map(item => ({
              root: item.root,
              wordsString: item.words ? item.words.join(', ') : ''
            }));
            setEditData(editableData);
          };

          const saveEditor = () => {
            const parsedData = editData.map(item => ({
              root: item.root.trim(),
              words: (item.wordsString || '').split(',').map(s => s.trim()).filter(s => s !== '')
            })).filter(item => item.root !== '' && item.words.length > 0);

            if (parsedData.length < 2) {
              setAlertMsg("חובה להכניס לפחות 2 מטרות עם תשובות כדי שהמשחק יעבוד.");
              return;
            }
            
            setGameData(parsedData);
            // כאן אפשר לעדכן את הכותרת אם המשתמש רוצה שם ספציפי למשחק שיצר
            setGameTitle(editTitle.trim() || "משחק מהירות");
            setGameState('menu');
          };

          const getAiTime = useCallback(() => {
            const base = { easy: 7000, medium: 4500, hard: 2500 }[difficulty];
            const variance = Math.random() * 1500 - 750; 
            return Math.max(1500, base + variance);
          }, [difficulty]);

          const startNewRound = useCallback(() => {
            if (gameData.length === 0) return;
            const newTarget = Math.floor(Math.random() * gameData.length);
            setCenterRootIndex(newTarget);
            setPlayerItems(generateCardItems(newTarget, gameData));
            setComputerItems(generateCardItems(newTarget, gameData));
            setRound(prev => prev + 1);
          }, [gameData]);

          const startGame = () => {
            if (gameData.length < 2) {
              setAlertMsg("אין מספיק מילים במשחק! כנס לעורך והוסף מילים.");
              return;
            }
            setPlayerCardsLeft(15);
            setComputerCardsLeft(15);
            setGameState('playing');
            setWinner(null);
            setFeedback(null);
            startNewRound();
          };

          useEffect(() => {
            if (gameState !== 'playing' || feedback || centerRootIndex === null || !gameData[centerRootIndex]) return;

            const timer = setTimeout(() => {
              const rootName = gameData[centerRootIndex].root;
              const displayRootName = withNiqqud ? rootName : stripNiqqud(rootName);
              setFeedback({ type: 'ai-match', text: `המחשב מצא: ${displayRootName}` });
              
              setTimeout(() => {
                setComputerCardsLeft(prev => {
                  const next = prev - 1;
                  if (next === 0) {
                    setWinner('computer');
                    setGameState('ended');
                  } else {
                    startNewRound();
                  }
                  return next;
                });
                setFeedback(null);
              }, 1500);

            }, getAiTime());

            return () => clearTimeout(timer);
          }, [round, gameState, centerRootIndex, feedback, getAiTime, startNewRound, gameData, withNiqqud]);

          const handleWordClick = (item) => {
            if (gameState !== 'playing' || feedback) return; 

            let isCorrect = item.rootIndex === centerRootIndex;
            if (!isCorrect && gameData[centerRootIndex].words.includes(item.text)) {
                isCorrect = true;
            }
            if (!isCorrect && gameData[centerRootIndex].root.startsWith("כפולות של ")) {
                const targetNumber = parseInt(gameData[centerRootIndex].root.replace("כפולות של ", "").trim());
                const clickedNumber = parseInt(item.text);
                if (!isNaN(targetNumber) && !isNaN(clickedNumber) && clickedNumber % targetNumber === 0) {
                    isCorrect = true;
                }
            }

            if (isCorrect) {
              setFeedback({ type: 'player-match', text: `הצלחת כל הכבוד!!` });
              setTimeout(() => {
                setPlayerCardsLeft(prev => {
                  const next = prev - 1;
                  if (next === 0) {
                    setWinner('player');
                    setGameState('ended');
                  } else {
                    startNewRound();
                  }
                  return next;
                });
                setFeedback(null);
              }, 1000);
            } else {
              setFeedback({ type: 'error', text: 'טעות! נסה לחפש שוב' });
              setTimeout(() => setFeedback(null), 800);
            }
          };

          return (
            <div className="min-h-screen flex flex-col w-full overflow-x-hidden relative">
              
              {/* מסך פתיחה */}
              {gameState === 'splash' && (
                <div className="fixed inset-0 z-[100] flex flex-col items-center justify-center bg-zinc-900 brick-bg transition-opacity duration-1000">
                  <div className="text-center animate-splash">
                    <div className="mb-6">
                      <i className="fa-solid fa-rotate-left text-cyan-400 text-[6rem] md:text-[8rem] animate-spin" style={{ animationDuration: '3s' }}></i>
                    </div>
                    <h1 className="text-4xl md:text-7xl font-black text-transparent bg-clip-text bg-gradient-to-r from-pink-500 via-yellow-400 to-cyan-400 graffiti-text drop-shadow-2xl">
                       משחק מהירות
                    </h1>
                    <p className="mt-8 text-zinc-400 font-bold tracking-widest uppercase animate-pulse">
                      טוען את המשחק...
                    </p>
                  </div>
                </div>
              )}

              {/* מודל התראות */}
              {alertMsg && (
                <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/80 backdrop-blur-sm">
                  <div className="bg-zinc-900 border-2 border-red-500 p-8 rounded-2xl max-w-sm text-center shadow-[0_0_30px_rgba(239,68,68,0.5)] transform scale-100 animate-in fade-in zoom-in">
                    <div className="mb-4">
                      <i className="fa-solid fa-circle-exclamation text-4xl text-red-500 drop-shadow-[0_0_10px_rgba(239,68,68,0.8)]"></i>
                    </div>
                    <h3 className="text-2xl font-black text-transparent bg-clip-text bg-gradient-to-r from-red-400 to-pink-500 mb-4">שים לב!</h3>
                    <p className="text-white text-lg mb-6 font-bold">{alertMsg}</p>
                    <button 
                      onClick={() => setAlertMsg(null)} 
                      className="bg-red-500 hover:bg-red-600 text-white text-lg font-bold py-3 px-8 rounded-xl transition-all shadow-[0_0_15px_rgba(239,68,68,0.5)] transform hover:scale-105 w-full"
                    >
                      הבנתי
                    </button>
                  </div>
                </div>
              )}

              <header className="relative bg-black/80 border-b-4 border-pink-500 p-4 shadow-[0_4px_20px_rgba(236,72,153,0.3)] z-20 shrink-0 flex flex-col md:flex-row items-center justify-between gap-4">
                <div className="hidden md:block w-32"></div>
                <h1 className="flex-1 text-3xl md:text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-pink-500 via-yellow-400 to-cyan-400 text-center graffiti-text flex items-center justify-center gap-4 drop-shadow-md">
                  {gameTitle} 
                  <i className="fa-solid fa-rotate-left text-cyan-400 text-3xl md:text-5xl"></i>
                </h1>
                <div className="w-auto md:w-32 flex justify-center md:justify-end">
                  {gameState !== 'menu' && gameState !== 'splash' && (
                    <button
                      onClick={() => setGameState('menu')}
                      className="bg-zinc-800 hover:bg-zinc-700 text-cyan-400 hover:text-white border border-cyan-800 hover:border-cyan-400 px-4 py-2 rounded-xl transition-all flex items-center gap-2 shadow-[0_0_10px_rgba(34,211,238,0.2)] z-30"
                    >
                      <i className="fa-solid fa-house text-lg"></i>
                      <span className="font-bold whitespace-nowrap">לתפריט הראשי</span>
                    </button>
                  )}
                </div>
              </header>

              <main className="flex-1 container mx-auto px-2 py-6 flex flex-col justify-center items-center relative w-full z-10">
                
                {gameState === 'menu' && (
                  <div className="bg-zinc-900/90 border-4 border-cyan-400 p-6 md:p-10 rounded-3xl shadow-[0_0_40px_rgba(34,211,238,0.3)] text-center max-w-3xl w-full">
                    <div className="space-y-6">
                      <h2 className="text-3xl font-black text-pink-400 graffiti-text">איך משחקים?</h2>
                      <div className="bg-black/50 p-6 rounded-2xl text-right text-lg border border-zinc-700">
                        <p className="flex items-start gap-3 mb-4">
                          <i className="fa-solid fa-circle-info text-cyan-400 text-xl mt-1"></i>
                          <span><strong>המטרה:</strong> להיפטר מכל הקלפים לפני המחשב.</span>
                        </p>
                        <p className="flex items-start gap-3 mb-4">
                          <i className="fa-solid fa-circle-check text-green-400 text-xl mt-1"></i>
                          <span>במרכז תמיד תופיע <strong>מטרה אחת גדולה</strong>. מצא בקלף שלך את התשובה שמתאימה לה!</span>
                        </p>
                        <p className="flex items-start gap-3 text-yellow-300">
                          <i className="fa-solid fa-triangle-exclamation text-yellow-400 text-xl mt-1"></i>
                          <span>זה קל, ברור, ומובטח שתמיד תהיה לך תשובה אחת נכונה!</span>
                        </p>
                      </div>

                      <div className="flex flex-col md:flex-row gap-8 justify-center items-start pt-4 border-t border-zinc-700/50 mt-4">
                        <div className="flex-1 w-full">
                          <h3 className="text-2xl font-bold mb-4 text-white flex items-center justify-center gap-2">
                            <i className="fa-solid fa-gear text-zinc-400 text-xl"></i> בחר רמה
                          </h3>
                          <div className="flex flex-wrap justify-center gap-3">
                            {[{ id: 'easy', label: 'קל' }, { id: 'medium', label: 'בינוני' }, { id: 'hard', label: 'קשה' }].map((level) => (
                              <button key={level.id} onClick={() => setDifficulty(level.id)} className={`px-5 py-2 rounded-xl font-bold text-lg transition-all border-b-4 ${difficulty === level.id ? 'bg-cyan-500 text-black border-cyan-700 shadow-[0_0_15px_rgba(34,211,238,0.6)] scale-105' : 'bg-zinc-800 text-zinc-300 border-zinc-950 hover:bg-zinc-700'}`}>{level.label}</button>
                            ))}
                          </div>
                        </div>
                        <div className="flex-1 w-full border-t md:border-t-0 md:border-r border-zinc-700/50 pt-6 md:pt-0 md:pr-8">
                          <h3 className="text-2xl font-bold mb-4 text-white flex items-center justify-center gap-2">
                            <i className="fa-solid fa-font text-zinc-400 text-xl"></i> תצוגת מילים
                          </h3>
                          <div className="flex flex-wrap justify-center gap-3">
                            <button onClick={() => setWithNiqqud(true)} className={`px-5 py-2 rounded-xl font-bold text-lg transition-all border-b-4 ${withNiqqud ? 'bg-pink-500 text-white border-pink-700 shadow-[0_0_15px_rgba(236,72,153,0.6)] scale-105' : 'bg-zinc-800 text-zinc-300 border-zinc-950 hover:bg-zinc-700'}`}>עם ניקוד</button>
                            <button onClick={() => setWithNiqqud(false)} className={`px-5 py-2 rounded-xl font-bold text-lg transition-all border-b-4 ${!withNiqqud ? 'bg-pink-500 text-white border-pink-700 shadow-[0_0_15px_rgba(236,72,153,0.6)] scale-105' : 'bg-zinc-800 text-zinc-300 border-zinc-950 hover:bg-zinc-700'}`}>בלי ניקוד</button>
                          </div>
                        </div>
                      </div>

                      <div className="flex flex-col md:flex-row gap-4 justify-center items-center mt-8 pt-6">
                        <button onClick={startGame} className="bg-zinc-800 hover:bg-zinc-700 text-green-400 border-2 border-green-500 text-2xl md:text-3xl font-black py-4 px-8 rounded-full shadow-[0_0_15px_rgba(74,222,128,0.3)] transform transition hover:scale-105 flex items-center justify-center gap-3 w-full md:w-auto"><i className="fa-solid fa-play text-2xl"></i>למשחק</button>
                        <button onClick={openEditor} className="bg-zinc-800 hover:bg-zinc-700 text-pink-400 border-2 border-pink-500 text-xl font-bold py-4 px-6 rounded-full shadow-[0_0_15px_rgba(236,72,153,0.3)] transform transition hover:scale-105 flex items-center justify-center gap-2 w-full md:w-auto"><i className="fa-solid fa-pen-to-square text-xl"></i>צור משחק / בחר נושא</button>
                      </div>
                    </div>
                  </div>
                )}

                {gameState === 'editor' && (
                  <div className="bg-zinc-900 border-4 border-pink-500 p-6 md:p-8 rounded-3xl shadow-[0_0_40px_rgba(236,72,153,0.4)] max-w-6xl w-full flex flex-col">
                    <div className="flex justify-between items-center mb-6 border-b border-zinc-700 pb-4 shrink-0"><h2 className="text-3xl font-black text-transparent bg-clip-text bg-gradient-to-r from-pink-400 to-purple-500 graffiti-text flex items-center gap-3"><i className="fa-solid fa-pen-to-square text-pink-400 text-3xl"></i> עורך המשחקים</h2></div>
                    <div className="flex-1 space-y-6">
                      <div className="bg-purple-900/30 p-4 rounded-2xl border border-purple-500/50"><div className="flex items-center gap-2 mb-3"><i className="fa-solid fa-book-open text-purple-400 text-xl"></i><label className="text-purple-300 font-bold text-lg">בחר תבנית מוכנה מראש:</label></div><div className="flex flex-wrap gap-2 md:gap-3">{Object.keys(GAME_TEMPLATES).map(k => <button key={k} onClick={() => loadTemplate(k)} className="bg-purple-800 hover:bg-purple-600 text-white px-3 py-2 rounded-xl font-bold transition text-sm md:text-base">{GAME_TEMPLATES[k].title.split(': ')[1] || "חופשי"}</button>)}</div></div>
                      <div className="bg-black/40 p-4 rounded-2xl border border-zinc-700"><label className="block text-cyan-400 font-bold mb-2 text-lg">שם המשחק:</label><input type="text" value={editTitle} onChange={(e) => setEditTitle(e.target.value)} className="w-full bg-zinc-800 border-2 border-zinc-600 text-white p-3 rounded-xl focus:border-cyan-400 outline-none font-bold text-lg"/></div>
                      <div className="bg-black/40 p-4 rounded-2xl border border-zinc-700"><div className="flex justify-between items-center mb-4"><label className="text-yellow-400 font-bold text-lg">המטרות והתשובות שלך:</label></div><div className="space-y-3">{editData.map((item, index) => (<div key={index} className="flex flex-col md:flex-row gap-3 bg-zinc-800/80 p-3 rounded-xl border border-zinc-600 relative group"><div className="flex-[1.5]"><input type="text" value={item.root} onChange={(e) => { const newData = [...editData]; newData[index].root = e.target.value; setEditData(newData); }} placeholder="מטרה" className="w-full bg-zinc-900 border border-zinc-700 text-pink-300 p-3 rounded-lg focus:border-pink-500 outline-none font-bold placeholder-zinc-500"/></div><div className="flex-[3]"><input type="text" value={item.wordsString} onChange={(e) => { const newData = [...editData]; newData[index].wordsString = e.target.value; setEditData(newData); }} placeholder="תשובות (מופרדות בפסיק)" className="w-full bg-zinc-900 border border-zinc-700 text-cyan-200 p-3 rounded-lg focus:border-cyan-500 outline-none placeholder-zinc-500"/></div><button onClick={() => { const newData = [...editData]; newData.splice(index, 1); setEditData(newData); }} className="bg-red-500/20 text-red-400 hover:bg-red-500 hover:text-white p-3 rounded-lg transition-colors flex items-center justify-center border border-red-500/30 w-12"><i className="fa-solid fa-trash-can text-xl"></i></button></div>))}</div><button onClick={() => setEditData([...editData, { root: "", wordsString: "" }])} className="mt-4 bg-zinc-800 hover:bg-zinc-700 text-white font-bold py-3 px-4 rounded-xl border-2 border-dashed border-zinc-500 hover:border-cyan-400 w-full flex items-center justify-center gap-2 transition-all text-lg"><i className="fa-solid fa-plus text-cyan-400 text-xl"></i> הוסף מטרה חדשה</button></div>
                    </div>
                    <div className="mt-6 flex flex-col md:flex-row gap-4 shrink-0 pt-4 border-t border-zinc-700"><button onClick={saveEditor} className="flex-1 bg-zinc-800 hover:bg-zinc-700 text-green-400 border-2 border-green-500 font-black text-xl py-4 rounded-xl shadow-[0_0_15px_rgba(74,222,128,0.3)] transition-all hover:scale-[1.02] flex items-center justify-center gap-2"><i className="fa-solid fa-floppy-disk text-xl"></i> שמור ושחק!</button></div>
                  </div>
                )}

                {gameState === 'playing' && (
                  <div className="w-full flex flex-col md:flex-row items-center justify-center gap-4 md:gap-8 lg:gap-12 pb-8">
                    <div className="order-3 md:order-1 flex flex-col items-center bg-black/40 p-3 lg:p-4 rounded-3xl border border-green-900/50"><div className="mb-4 flex items-center gap-3 bg-green-500/20 px-4 py-2 rounded-2xl border border-green-500/50"><i className="fa-solid fa-user text-green-400 text-2xl"></i><div><h3 className="font-black text-lg lg:text-xl text-green-400">הקלף שלך</h3><p className="text-green-200 font-bold text-center text-sm">נותרו: {playerCardsLeft}</p></div></div><WordCardRenderer items={playerItems} role="player" onClick={handleWordClick} withNiqqud={withNiqqud}/><p className="mt-3 text-green-300 font-bold bg-green-900/30 px-3 py-1 rounded-lg border border-green-800/50 animate-pulse text-sm lg:text-base">חפש כאן את התשובה!</p></div>
                    <div className="order-1 md:order-2 relative flex flex-col items-center justify-center z-10 scale-100 md:scale-105 my-2 md:my-0">{feedback && <div className={`absolute z-50 top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 px-6 py-3 rounded-2xl font-black text-xl md:text-3xl shadow-[0_10px_40px_rgba(0,0,0,0.8)] whitespace-nowrap animate-bounce border-4 ${feedback.type === 'error' ? 'bg-red-600 text-white border-red-900' : feedback.type === 'ai-match' ? 'bg-orange-500 text-black border-orange-200' : 'bg-green-400 text-black border-green-200'}`}>{feedback.text}</div>}<div className="mb-4 flex flex-col items-center"><h3 className="font-black text-2xl lg:text-4xl text-transparent bg-clip-text bg-gradient-to-r from-purple-400 to-pink-500 graffiti-text drop-shadow-[0_2px_2px_rgba(0,0,0,1)]">המטרה</h3></div><div className={feedback?.type === 'error' ? 'animate-pulse' : ''}><CenterCardRenderer rootIndex={centerRootIndex} gameData={gameData} withNiqqud={withNiqqud}/></div></div>
                    <div className="order-2 md:order-3 flex flex-col items-center bg-black/40 p-3 lg:p-4 rounded-3xl border border-red-900/50"><div className="mb-4 flex items-center gap-3 bg-red-500/20 px-4 py-2 rounded-2xl border border-red-500/50"><i className="fa-solid fa-microchip text-red-400 text-2xl"></i><div><h3 className="font-black text-lg lg:text-xl text-red-400">היריב (מחשב)</h3><p className="text-red-200 font-bold text-center text-sm">נותרו: {computerCardsLeft}</p></div></div><WordCardRenderer items={computerItems} role="computer" withNiqqud={withNiqqud}/><p className="mt-3 text-zinc-500 font-bold bg-zinc-900 px-3 py-1 rounded-lg border border-zinc-800 text-sm lg:text-base">היריב מחפש...</p></div>
                  </div>
                )}

                {gameState === 'ended' && (
                  <div className="bg-zinc-900/90 border-4 border-pink-500 rounded-3xl shadow-[0_0_50px_rgba(236,72,153,0.5)] p-10 text-center space-y-8 animate-in slide-in-from-bottom-10 max-w-lg w-full"><i className={`fa-solid fa-trophy text-[6rem] mx-auto drop-shadow-lg block text-center mb-6 ${winner === 'player' ? 'text-yellow-400' : 'text-zinc-600'}`}></i><h2 className={`text-5xl font-black graffiti-text ${winner === 'player' ? 'text-green-400' : 'text-red-500'}`}>{winner === 'player' ? 'ניצחת!!!' : 'המחשב ניצח'}</h2><p className="text-2xl text-zinc-300 font-bold">{winner === 'player' ? 'מדהים! היית מהיר וחד.' : 'לא נורא, תמיד אפשר לנסות שוב.'}</p><div className="pt-8 flex gap-4 justify-center"><button onClick={startGame} className="bg-gradient-to-r from-pink-500 to-purple-600 hover:from-pink-400 hover:to-purple-500 text-white text-2xl font-black py-4 px-8 rounded-full shadow-[0_0_20px_rgba(236,72,153,0.6)] transform transition hover:scale-110 inline-flex items-center gap-3 graffiti-text uppercase"><i className="fa-solid fa-rotate-left text-2xl"></i>שחק שוב</button></div></div>
                )}

              </main>
              
              <footer className="w-full text-center py-4 bg-black/60 text-zinc-400 text-sm md:text-base font-medium border-t border-zinc-800 z-10 shrink-0">
                יצרה וערכה באמצעות AI: מורן קמיל גלברג, הוראה מותאמת
              </footer>

            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
